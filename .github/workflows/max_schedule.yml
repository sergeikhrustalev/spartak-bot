name: MAX Spartak Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MAX bot
        env:
          ACCESS_TOKEN: ${{ secrets.MAX_ACCESS_TOKEN }}
        run: python max_spartak_bot.py

      - name: Save posted articles list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_max.json
          git diff --staged --quiet || git commit -m "Update MAX posted articles"
          git push
